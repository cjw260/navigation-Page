    <style>
        body {
            background-color: #fcf9f5;
            color: #1c1c1a;
        }

        .fade-in-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-in-up.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .project-card {
            position: relative;
            overflow: hidden;
            border: 1px solid #E5E2DD;
            background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(245,245,245,0.4) 100%);
            border-radius: 0.125rem;
        }

        .project-card-image-container {
            overflow: hidden;
            position: relative;
        }

        .project-card-image {
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .project-card:hover .project-card-image,
        .project-card:active .project-card-image {
            transform: scale(1.05);
        }

        .project-card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .project-card:hover .project-card-overlay,
        .project-card:active .project-card-overlay {
            opacity: 1;
        }

        .project-card-info {
            position: absolute;
            bottom: 24px;
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: white;
            transform: translateY(20px);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1) 0.1s, opacity 0.5s ease 0.1s;
        }

        .project-card:hover .project-card-info,
        .project-card:active .project-card-info {
            transform: translateY(0);
            opacity: 1;
        }

        .project-btn {
            transform: scale(0.9) translateY(10px);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1) 0.1s, opacity 0.5s ease 0.1s, background-color 0.2s, color 0.2s;
        }

        .project-card:hover .project-btn,
        .project-card:active .project-btn {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh; /* 修改为 100vh，确保跨设备垂直居中更精准 */
            background-color: #fcf9f5;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1);
            will-change: transform; /* 提前告知浏览器将进行位移，优化性能 */
        }

        .pulse-text {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            -webkit-font-smoothing: antialiased; /* 统一字体抗锯齿渲染，防止变色 */
            backface-visibility: hidden; /* 核心修复：强制硬件加速层，防止位移跳动和闪烁 */
            transform: translateZ(0); 
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .loader-slide-up {
            transform: translateY(-100%);
        }

    <!-- Scripts -->
    <script>
        // Loader logic
        document.addEventListener("DOMContentLoaded", () => {
            const loader = document.getElementById('loader');
            
            setTimeout(() => {
                loader.classList.add('loader-slide-up');
                
                // Trigger initial fade-ins after loader moves
                setTimeout(() => {
                    handleScrollAnimations();
                }, 500);
            }, 2000);
        });

        // Intersection Observer for scroll animations
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.15
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        function handleScrollAnimations() {
            const elements = document.querySelectorAll('.fade-in-up');
            elements.forEach(el => observer.observe(el));
        }
    </script>
