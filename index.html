        .fade-in-up {

        .project-card:hover .project-card-image,

        }

        .project-card-overlay {

            background: rgba(0,0,0,0.4);

            flex-direction: column;
            justify-content: center;

        .project-card-info {

        .project-card:hover .project-card-info,
        .project-card:active .project-card-info {

            opacity: 1;
        }

        .project-btn {
            transform: scale(0.9) translateY(10px);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1) 0.1s, opacity 0.5s ease 0.1s, background-color 0.2s, color 0.2s;
        }

        .project-card:hover .project-btn,
        .project-card:active .project-btn {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh; /* 修改为 100vh，确保跨设备垂直居中更精准 */
            background-color: #fcf9f5;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1);
            will-change: transform; /* 提前告知浏览器将进行位移，优化性能 */
        }

        .pulse-text {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            -webkit-font-smoothing: antialiased; /* 统一字体抗锯齿渲染，防止变色 */
            backface-visibility: hidden; /* 核心修复：强制硬件加速层，防止位移跳动和闪烁 */
            transform: translateZ(0); 
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .loader-slide-up {
            transform: translateY(-100%);
        }

        /* ====== Vinyl Card（严格复刻 React 源码）====== */
        .vinyl-card {
            position: relative;
            width: 288px;
            height: 288px;
            cursor: pointer;
            border-radius: 16px;
            background: rgba(255,255,255,.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0,0,0,.05);
            transition: all .2s ease-out;
            z-index: 10;
            transform-style: preserve-3d;
        }
        .vinyl-bg-glow {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            overflow: hidden;
            z-index: -10;
            transition: transform .1s ease-out;
            opacity: .4;
            pointer-events: none;
        }
        .vinyl-bg-glow::before {
            content: '';
            position: absolute;
            inset: -40px;
            background: linear-gradient(135deg, rgba(229,229,229,.5), rgba(231,229,228,.5), rgba(212,212,212,.5));
            filter: blur(40px);
            border-radius: 50%;
        }
        .vinyl-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
            pointer-events: none;
        }
        .vinyl-disc {
            width: 224px;
            height: 224px;
            border-radius: 50%;
            background: #000;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255,255,255,.1);
            transition: transform .1s ease-out;
        }
        .vinyl-disc.intro { transition: transform 1s ease-in-out; }
        .vinyl-disc .groove { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,.05); }
        .vinyl-disc .groove:nth-child(1) { inset: 4px; }
        .vinyl-disc .groove:nth-child(2) { inset: 12px; border-color: rgba(255,255,255,.1); }
        .vinyl-disc .groove:nth-child(3) { inset: 24px; }
        .vinyl-disc .groove:nth-child(4) { inset: 40px; border-color: rgba(255,255,255,.1); }
        .vinyl-disc .groove:nth-child(5) { inset: 56px; }
        .vinyl-label {
            width: 96px; height: 96px;
            border-radius: 50%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,.5);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.2);
            position: relative;
            z-index: 1;
        }
        .vinyl-label img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: .9; }
        .vinyl-label::after { content: ''; width: 12px; height: 12px; background: #fff; border-radius: 50%; z-index: 10; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,.3); }
        .vinyl-gloss {
            position: absolute; inset: 0; background: linear-gradient(135deg, transparent, rgba(255,255,255,.1), transparent);
            transform: rotate(45deg); pointer-events: none; z-index: 2;
        }
        .vinyl-cover {
            position: absolute; inset: 24px;
            z-index: 10;
            pointer-events: none;
            transition: transform .1s ease-out, filter .1s ease-out;
        }
        .vinyl-cover-inner {
            width: 100%; height: 100%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .vinyl-cover-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .vinyl-cover-inner::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.2), transparent 60%);
            pointer-events: none; border-radius: 12px;
        }
        .vinyl-badge {
            position: absolute; top: 32px; right: -16px; z-index: 20;
            pointer-events: none;
            transition: transform .1s ease-out;
        }
        .vinyl-badge span {
            display: block;
            background: rgba(0,0,0,.9);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .05em;
            padding: 6px 12px;
            box-shadow: 0 4px 12px rgba(0,0,0,.15);
            transform: rotate(3deg);
        }
        .vinyl-badge::after {
            content: '';
            display: block;
            width: 32px; height: 16px;
            background: rgba(0,0,0,.3);
            transform: rotate(-45deg);
            transform-origin: bottom right;
            z-index: -10;
            position: absolute;
            bottom: -4px; left: -8px;
        }
        .vinyl-title {
            position: absolute; bottom: 40px; left: 12px; z-index: 20;
            pointer-events: none;
            transition: transform .1s ease-out;
        }
        .vinyl-title .t1 {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 900;
            color: rgba(0,0,0,.9);
            letter-spacing: .08em;
            line-height: 1.2;
            text-shadow: 0 1px 2px rgba(0,0,0,.05);
        }
        .vinyl-title .t2 {
            font-family: 'Hanken Grotesk', monospace;
            font-size: 12px; font-weight: 400;
            color: rgba(0,0,0,.5);
            letter-spacing: .08em;
            margin-top: 4px;
            transform: scale(.75);
            transform-origin: left;
            white-space: nowrap;
        }
        @media (min-width: 768px) {
            .vinyl-card { width: 320px; height: 320px; }
            .vinyl-disc { width: 256px; height: 256px; }
        }
    </style>
</head>

    <footer class="w-full py-12 bg-surface dark:bg-surface-container-lowest border-t border-outline-variant/30 dark:border-outline/20 flat no shadows font-body-md text-label-sm tracking-normal relative z-10">
        <div class="flex flex-col md:flex-row justify-between items-center px-6 md:px-margin-desktop max-w-container-max mx-auto gap-gutter">
            <div class="font-display-lg text-headline-lg text-primary dark:text-on-surface mb-6 md:mb-0">CAIN</div>
            <nav class="flex gap-6 items-center text-secondary dark:text-outline"></nav>

    <!-- Scripts -->
    <script>
        // Loader logic — 等所有资源（图片/字体/模型）加载完 + 1.5s
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            // 页面资源全部加载完成后，再给 1.5s 让用户看到卡片 intro
            setTimeout(() => {
                loader.classList.add('loader-slide-up');
                // 触发黑胶 intro 动画
                triggerVinylIntro();
                // 滚动淡入动画
                setTimeout(() => {
                    handleScrollAnimations();
                }, 500);
            }, 1500);
        });

        // Intersection Observer for scroll animations
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.15
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        function handleScrollAnimations() {
            const elements = document.querySelectorAll('.fade-in-up');
            elements.forEach(el => observer.observe(el));
        }

        // ====== Vinyl Card 3D Tilt（严格复刻 React 源码）======
        (function() {
            const card = document.getElementById('vinylCard');
            if (!card) return;
            const disc = document.getElementById('vinylDisc');
            const cover = document.getElementById('vinylCover');
            const badge = document.getElementById('vinylBadge');
            const title = document.getElementById('vinylTitle');
            const bgGlow = card.querySelector('.vinyl-bg-glow');
            let centerX = 0, centerY = 0, isHovering = false;
            let introDone = false;

            function updateCenter() {
                const r = card.getBoundingClientRect();
                centerX = r.left + r.width / 2;
                centerY = r.top + r.height / 2;
            }
            updateCenter();
            window.addEventListener('resize', updateCenter);

            // 复刻源码 rotate 函数
            function rotate(cursorPosition, centerPosition, threshold) {
                threshold = threshold || 20;
                var delta = cursorPosition - centerPosition;
                return delta >= 0
                    ? (delta >= threshold ? threshold : delta)
                    : (delta <= -threshold ? -threshold : delta);
            }
            // 复刻源码 brightness 函数
            function brightness(cursorPositionY, centerPositionY, strength) {
                strength = strength || 20;
                return 1 - rotate(cursorPositionY, centerPositionY) / strength * 0.05;
            }

            // Intro 由遮屏动画结束后调用
            window.triggerVinylIntro = function() {
                if (!disc) return;
                disc.classList.add('intro');
                disc.style.transform = 'translate(160px, 0px) rotate(30deg)';
                setTimeout(function() {
                    disc.classList.remove('intro');
                    if (!isHovering) {
                        disc.style.transform = 'translate(20px, 0px) rotate(0deg)';
                    }
                    introDone = true;
                }, 1000);
            };

            card.addEventListener('mouseenter', function() {
                isHovering = true;
                updateCenter();
            });

            card.addEventListener('mouseleave', function() {
                isHovering = false;
                if (!introDone) return;
                // 复刻 handleMouseLeave
                card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg) scale(1)';
                card.style.filter = 'brightness(1) drop-shadow(0 10px 20px rgba(0,0,0,.05))';
                card.style.boxShadow = '0 0 0 0 rgba(0,0,0,0)';
                disc.style.transform = 'translate(20px, 0px) rotate(0deg)';
                cover.style.transform = 'translate(0px, 0px)';
                cover.style.filter = 'drop-shadow(0 8px 12px rgba(0,0,0,.08))';
                badge.style.transform = 'translate(0px, 0px)';
                title.style.transform = 'translate(0px, 0px)';
                if (bgGlow) bgGlow.style.transform = 'translate(0px, 0px)';
            });

            card.addEventListener('mousemove', function(e) {
                if (!introDone) return;
                // 复刻 handleMouseMove — 完全一致的公式
                var calcX = rotate(e.clientX, centerX, 15);
                var calcY = rotate(e.clientY, centerY, 15);
                var calcX2 = e.clientX - centerX;
                var calcY2 = e.clientY - centerY;

                card.style.transform = 'translateZ(0) perspective(1000px) rotateY(' + calcX + 'deg) rotateX(' + (-calcY/2) + 'deg) scale(1.05)';
                card.style.filter = 'brightness(' + brightness(e.clientY, centerY, 30) + ')';
                card.style.boxShadow = (-calcX*1.5) + 'px ' + (-calcY*1.5) + 'px 30px rgba(0,0,0,.08)';

                // 黑胶：160px 基础偏移 + 鼠标视差
                disc.style.transform = 'translate(' + (calcX2/10 + 160) + 'px, ' + (calcY2/15) + 'px) rotate(' + (calcX2/4) + 'deg)';
                // 封面
                cover.style.transform = 'translate(' + (calcX2/20) + 'px, ' + (calcY2/20) + 'px)';
                cover.style.filter = 'drop-shadow(' + (-calcX) + 'px ' + (-calcY) + 'px 15px rgba(0,0,0,.1))';
                // 徽章 + 标题
                badge.style.transform = 'translate(' + (calcX2/8) + 'px, ' + (calcY2/12) + 'px)';
                title.style.transform = 'translate(' + (calcX2/8) + 'px, ' + (calcY2/12) + 'px)';
                if (bgGlow) bgGlow.style.transform = 'translate(' + (calcX2/20) + 'px, ' + (calcY2/20) + 'px)';
            });
        })();
    </script>
</body>
